<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="astrolab.ico" type="image/x-icon">
  <title>Astronomia do Dia</title>

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css">

  <!-- JS (defer resolve metade dos problemas da humanidade) -->
  <script src="js/script.js" defer></script>
  
</head>

<body>

  <div id="container">
    <div class="input-group">
        <div class="input-icon">
          <i class="fa-solid fa-magnifying-glass" style="color: rgb(255, 255, 255);"></i>
        </div>
        <input id="search"
        type="text" 
        class="input-field" 
        placeholder="Pesquisar"
      >
    </div>
  </div>

<header>
  <div class="logo-box">
    <img src="logo-400.png" class="logo">
  </div>
  <h1>Astrolab</h1>
</header>

<nav class="navbar">
  <input type="date" id="search">

  <button id="btn-history">Histórico</button>
  <button id="btn-ai">IA Tradicional</button>
  <button id="btn-ai-gen">IA Generativa</button>
  
</nav>

<main class="container">

  <section class="left">
    <div id="media"></div>

    <h2 id="title"></h2>

    <p><strong>Data:</strong> <span id="date"></span></p>

    <p id="desc"></p>
  </section>

  <aside class="right">
    <div class="card" id="info"></div>
    <div class="card" id="fact"></div>
  </aside>


</main>

<div id="modal" class="modal hidden"></div>
<img src="logo-400.png" width="200">
</body>
</html>
